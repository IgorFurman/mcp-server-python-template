# Simplified Production Docker Compose for mcp-sequential-think:ollama-enhanced
version: '3.8'

services:
  sequential-think-server:
    image: mcp-sequential-think:ollama-enhanced
    container_name: sequential-think-mcp-production
    restart: unless-stopped
    
    # Environment Configuration
    environment:
      - NODE_ENV=production
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=7071
      - OLLAMA_BASE_URL=http://ollama:11434
      - SEQUENTIAL_THINK_ENV=production
      - LOG_LEVEL=info
      
    # Port Mapping
    ports:
      - "7071:7071"
    
    # Health Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7071/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Dependencies
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    restart: unless-stopped
    
    environment:
      - OLLAMA_HOST=0.0.0.0
    
    ports:
      - "11434:11434"
    
    volumes:
      - ollama-models:/root/.ollama
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Model Preloader Service
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-model-preloader
    depends_on:
      ollama:
        condition: service_healthy
    
    environment:
      - OLLAMA_HOST=http://ollama:11434
    
    volumes:
      - ./scripts/preload-models.sh:/preload-models.sh:ro
    
    command: /bin/bash /preload-models.sh
    
    restart: "no"

# Volumes
volumes:
  ollama-models:
    driver: local
